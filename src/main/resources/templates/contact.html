<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<!-- Page Header -->
<section class="py-5" style="background: linear-gradient(135deg, #0a1628 0%, #1a3a6a 100%); padding-top: 120px;">
    <div class="container text-white text-center" data-aos="fade-up">
        <h1 class="display-4 fw-bold">Contactez-nous</h1>
        <p class="lead" style="opacity: 0.9;">Nous sommes à votre écoute pour tout projet</p>
    </div>
</section>

<!-- Contact Form -->
<section class="py-5" style="background: #f8f9fa;">
    <div class="container">
        <div class="row g-5">
            <div class="col-lg-6" data-aos="fade-right">
                <div class="card border-0 shadow-lg p-4">
                    <h3 class="fw-bold mb-4">Envoyez-nous un message</h3>

                    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${successMessage}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/contact}" th:object="${contactMessage}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nom complet</label>
                            <input type="text" class="form-control form-control-lg" th:field="*{name}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control form-control-lg" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Téléphone</label>
                            <input type="tel" class="form-control form-control-lg" th:field="*{phone}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Sujet</label>
                            <input type="text" class="form-control form-control-lg" th:field="*{subject}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Message</label>
                            <textarea class="form-control form-control-lg" rows="5" th:field="*{message}" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
                            <i class="fas fa-paper-plane me-2"></i>Envoyer
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-lg-6" data-aos="fade-left">
                <div class="card border-0 shadow-lg p-4 h-100">
                    <h3 class="fw-bold mb-4">Informations de contact</h3>
                    <div class="mb-4">
                        <h5><i class="fas fa-map-marker-alt text-warning me-2"></i>Adresse</h5>
                        <p class="text-muted">Bamako, Mali</p>
                    </div>
                    <div class="mb-4">
                        <h5><i class="fas fa-phone text-warning me-2"></i>Téléphone</h5>
                        <p class="text-muted">+223 XX XX XX XX</p>
                    </div>
                    <div class="mb-4">
                        <h5><i class="fas fa-envelope text-warning me-2"></i>Email</h5>
                        <p class="text-muted">contact@africanmission.com</p>
                    </div>
                    <div>
                        <h5><i class="fas fa-clock text-warning me-2"></i>Horaires</h5>
                        <p class="text-muted">Lundi - Vendredi: 8h00 - 17h00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script>
    AOS.init({duration: 800, once: true, offset: 100});
</script>
</body>
</html>
