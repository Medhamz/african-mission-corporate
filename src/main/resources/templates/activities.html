<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/header :: header}"></nav>

<!-- EN-TÊTE -->
<section class="page-header">
    <div class="container text-center" data-aos="fade-up">
        <h1 class="display-4 fw-bold">Nos activités</h1>
        <p class="lead">Découvrez l'ensemble de nos services et compétences</p>
    </div>
</section>

<!-- ACTIVITÉS -->
<section class="activities-section">
    <div class="container">
        <div class="row g-4">
            <div th:each="activity : ${activities}" class="col-md-6 col-lg-4"
                 data-aos="fade-up" th:data-aos-delay="${100 * activityStat.index}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="display-4 mb-3">
                            <i th:class="${activity.icon != null ? activity.icon : 'fas fa-check-circle'}"></i>
                        </div>
                        <h5 class="card-title" th:text="${activity.title}">Titre</h5>
                        <p class="card-text" th:text="${activity.description}">Description</p>
                        <span class="badge" th:text="${activity.category}">Catégorie</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- AOS -->
<script>
    AOS.init({duration: 800, once: true, offset: 100});
</script>
</body>
</html>
