<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Nos activités - African Mission Corporate</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">

    <style>
        /* ============================================
           STYLES DE LA PAGE ACTIVITIES (INTÉGRÉS POUR SÉCURITÉ)
        ============================================ */
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #212529;
            padding-top: 76px;
        }

        .page-header {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a6a 100%);
            padding: 120px 0 60px 0;
            color: #ffffff;
        }

        .page-header h1 {
            font-weight: 800;
            color: #ffffff;
        }

        .page-header p {
            opacity: 0.9;
            color: #ffffff;
        }

        .activities-section {
            background: #f8f9fa;
            padding: 60px 0;
        }

        .activities-section .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            height: 100%;
        }

        .activities-section .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12) !important;
        }

        .activities-section .card-body {
            padding: 28px 24px;
            background: #ffffff;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }

        .activities-section .card-title {
            color: #0a1628;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.15rem;
        }

        .activities-section .card-text {
            color: #6c757d;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .activities-section .display-4 {
            font-size: 2.5rem;
            color: #ffc107;
            margin-bottom: 16px;
        }

        .activities-section .badge {
            background: #f1f3f5 !important;
            color: #0a1628 !important;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #e9ecef;
            font-size: 0.85rem;
        }

        /* FORCER LA VISIBILITÉ */
        .card-body, .card-title, .card-text, .badge {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav th:replace="~{fragments/header :: header}"></nav>

<!-- ==================== EN-TÊTE BLEUE ==================== -->
<section class="page-header">
    <div class="container text-center" data-aos="fade-up">
        <h1 class="display-4 fw-bold">Nos activités</h1>
        <p class="lead">Découvrez l'ensemble de nos services et compétences</p>
    </div>
</section>

<!-- ==================== LISTE DES ACTIVITÉS ==================== -->
<section class="activities-section">
    <div class="container">
        <div class="row g-4">
            <div th:each="activity : ${activities}" class="col-md-6 col-lg-4"
                 data-aos="fade-up" th:data-aos-delay="${100 * activityStat.index}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="display-4 mb-3">
                            <i th:class="${activity.icon != null ? activity.icon : 'fas fa-check-circle'}"></i>
                        </div>
                        <h5 class="card-title" th:text="${activity.title}">Titre</h5>
                        <p class="card-text" th:text="${activity.description}">Description</p>
                        <span class="badge" th:text="${activity.category}">Catégorie</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- AOS Initialization -->
<script>
    AOS.init({duration: 800, once: true, offset: 100});
</script>

</body>
</html>
