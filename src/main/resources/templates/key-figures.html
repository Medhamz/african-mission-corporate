<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiffres Clés - African Mission Corporate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<!-- ============================================ -->
<!-- PAGE HEADER                                -->
<!-- ============================================ -->
<section class="py-5" style="background: var(--bg-secondary); padding-top: 100px; padding-bottom: 40px;">
    <div class="container">
        <div class="text-center" data-aos="fade-up">
            <div class="section-tag">✦ CHIFFRES ✦</div>
            <h1 class="section-title">
                <span class="gradient-text">African Mission</span> en chiffres
            </h1>
            <div class="section-line centered"></div>
            <p style="color: var(--text-secondary); font-size: 1.05rem;">L'impact de nos actions en quelques données</p>
        </div>
    </div>
</section>

<!-- ============================================ -->
<!-- STATISTIQUES                               -->
<!-- ============================================ -->
<section class="py-5" style="background: var(--bg-primary);">
    <div class="container">
        <div class="row g-4">
            <!-- Stat 1 -->
            <div class="col-md-3" data-aos="flip-up">
                <div class="card-premium text-center" style="padding: 32px;">
                    <div style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 8px;">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <div style="font-size: 2.8rem; font-weight: 700; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">30+</div>
                    <p style="color: var(--text-secondary); font-weight: 500;">Activités</p>
                    <div style="width: 30px; height: 2px; background: var(--gradient-main); margin: 8px auto;"></div>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Domaines d'expertise diversifiés</p>
                </div>
            </div>

            <!-- Stat 2 -->
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="100">
                <div class="card-premium text-center" style="padding: 32px;">
                    <div style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 8px;">
                        <i class="fas fa-users"></i>
                    </div>
                    <div style="font-size: 2.8rem; font-weight: 700; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">50+</div>
                    <p style="color: var(--text-secondary); font-weight: 500;">Projets réalisés</p>
                    <div style="width: 30px; height: 2px; background: var(--gradient-main); margin: 8px auto;"></div>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Au Mali et à l'international</p>
                </div>
            </div>

            <!-- Stat 3 -->
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="200">
                <div class="card-premium text-center" style="padding: 32px;">
                    <div style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 8px;">
                        <i class="fas fa-handshake"></i>
                    </div>
                    <div style="font-size: 2.8rem; font-weight: 700; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">15+</div>
                    <p style="color: var(--text-secondary); font-weight: 500;">Partenaires</p>
                    <div style="width: 30px; height: 2px; background: var(--gradient-main); margin: 8px auto;"></div>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Entreprises et institutions</p>
                </div>
            </div>

            <!-- Stat 4 -->
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="300">
                <div class="card-premium text-center" style="padding: 32px;">
                    <div style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 8px;">
                        <i class="fas fa-star"></i>
                    </div>
                    <div style="font-size: 2.8rem; font-weight: 700; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">100%</div>
                    <p style="color: var(--text-secondary); font-weight: 500;">Satisfaction</p>
                    <div style="width: 30px; height: 2px; background: var(--gradient-main); margin: 8px auto;"></div>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Taux de satisfaction client</p>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init({duration:800,once:true,offset:80});</script>
</body>
</html>
