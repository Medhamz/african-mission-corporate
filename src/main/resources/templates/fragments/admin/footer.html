<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="footer" class="admin-footer">
    <style>
        .admin-footer {
            margin-top: 40px;
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.04);
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            background: transparent;
        }
        .admin-footer a {
            color: #64748b;
            text-decoration: none;
            transition: color 0.2s;
        }
        .admin-footer a:hover {
            color: #f1f5f9;
        }
        .admin-footer .footer-dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #64748b;
            margin: 0 10px;
            vertical-align: middle;
        }
        @media (max-width: 576px) {
            .admin-footer {
                font-size: 0.65rem;
                padding: 12px 16px;
            }
        }
    </style>

    <div>
        &copy; 2026 <a href="/" target="_blank">African Mission Corporate</a>
        <span class="footer-dot"></span>
        Admin version 2.0
        <span class="footer-dot"></span>
        <span th:text="${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm')}"></span>
    </div>
</div>
</html>
