<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">African Mission Corporate</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body>

<!-- ============================================ -->
<!-- LOADER PREMIUM                              -->
<!-- ============================================ -->
<div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a1a; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.5s ease;">
    <div class="spinner-border text-warning" style="width:70px; height:70px;" role="status">
        <span class="visually-hidden">Chargement...</span>
    </div>
    <p class="text-white mt-3" style="font-family:'Inter',sans-serif; letter-spacing:2px; font-weight:300; color:#b8c6ff;">CHARGEMENT</p>
    <div style="width:200px; height:2px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; overflow:hidden;">
        <div id="loaderProgress" style="width:0%; height:100%; background:#ffc107; border-radius:2px; transition:width 0.3s ease;"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const loader = document.getElementById('loader');
        const progress = document.getElementById('loaderProgress');
        let width = 0;
        const interval = setInterval(() => {
            width += 1 + Math.random() * 3;
            if (width >= 95) { clearInterval(interval); }
            progress.style.width = Math.min(width, 95) + '%';
        }, 50);

        window.addEventListener('load', function() {
            clearInterval(interval);
            progress.style.width = '100%';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 600);
            }, 400);
        });
    });
</script>

<!-- ============================================ -->
<!-- NAVBAR CYBER - DESIGN MODERNE              -->
<!-- ============================================ -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="mainNav">
    <div class="container">
        <!-- Logo avec effet neon -->
        <a class="navbar-brand" href="/">
            <div class="logo-container">
                <i class="fas fa-globe-africa logo-icon"></i>
                <span class="logo-text">African <span class="logo-highlight">Mission</span></span>
                <span class="logo-badge">SARL</span>
            </div>
        </a>

        <!-- Toggler modernisé -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <!-- Accueil -->
                <li class="nav-item">
                    <a class="nav-link" href="/" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">
                        <i class="fas fa-home nav-icon"></i>
                        <span>Accueil</span>
                        <span class="nav-indicator"></span>
                    </a>
                </li>

                <!-- À propos -->
                <li class="nav-item">
                    <a class="nav-link" href="/about" th:classappend="${#httpServletRequest.requestURI == '/about' ? 'active' : ''}">
                        <i class="fas fa-info-circle nav-icon"></i>
                        <span>À propos</span>
                        <span class="nav-indicator"></span>
                    </a>
                </li>

                <!-- Services (dropdown) -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="servicesDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-cogs nav-icon"></i>
                        <span>Services</span>
                        <span class="nav-indicator"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-cyber">
                        <li><a class="dropdown-item" href="/services">
                            <i class="fas fa-briefcase me-2"></i>Nos services
                        </a></li>
                        <li><a class="dropdown-item" href="/activities">
                            <i class="fas fa-tasks me-2"></i>Activités
                        </a></li>
                        <li><a class="dropdown-item" href="/projects">
                            <i class="fas fa-rocket me-2"></i>Projets
                        </a></li>
                        <li><hr class="dropdown-divider" style="border-color: rgba(74,124,255,0.15);"></li>
                        <li><a class="dropdown-item" href="/faq">
                            <i class="fas fa-question-circle me-2"></i>FAQ
                        </a></li>
                    </ul>
                </li>

                <!-- Équipe -->
                <li class="nav-item">
                    <a class="nav-link" href="/team" th:classappend="${#httpServletRequest.requestURI == '/team' ? 'active' : ''}">
                        <i class="fas fa-users nav-icon"></i>
                        <span>Équipe</span>
                        <span class="nav-indicator"></span>
                    </a>
                </li>

                <!-- Contact -->
                <li class="nav-item">
                    <a class="nav-link" href="/contact" th:classappend="${#httpServletRequest.requestURI == '/contact' ? 'active' : ''}">
                        <i class="fas fa-envelope nav-icon"></i>
                        <span>Contact</span>
                        <span class="nav-indicator"></span>
                    </a>
                </li>
            </ul>

            <!-- Actions (recherche + bouton CTA) -->
            <div class="navbar-actions">
                <!-- Barre de recherche -->
                <form class="search-form" action="/search" method="get">
                    <div class="search-wrapper">
                        <input type="search" name="q" placeholder="Rechercher..." class="search-input">
                        <button type="submit" class="search-btn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Bouton CTA -->
                <a href="/contact" class="btn-cta-neon">
                    <i class="fas fa-paper-plane me-2"></i>Devis
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Barre de recherche mobile -->
<div class="mobile-search-bar d-lg-none">
    <form action="/search" method="get" class="mobile-search-form">
        <input type="search" name="q" placeholder="Rechercher..." class="mobile-search-input">
        <button type="submit" class="mobile-search-btn">
            <i class="fas fa-search"></i>
        </button>
    </form>
</div>

<style>
    /* ============================================
       NAVBAR CYBER - STYLES INTÉGRÉS
    ============================================ */
    #mainNav {
        background: rgba(10, 10, 26, 0.92) !important;
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(74, 124, 255, 0.08);
        padding: 10px 0;
        transition: all 0.4s ease;
    }

    /* Logo */
    .logo-container {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logo-icon {
        font-size: 1.6rem;
        color: #4a7cff;
        filter: drop-shadow(0 0 20px rgba(74, 124, 255, 0.3));
        animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
        0%, 100% { filter: drop-shadow(0 0 20px rgba(74, 124, 255, 0.3)); }
        50% { filter: drop-shadow(0 0 40px rgba(74, 124, 255, 0.6)); }
    }

    .logo-text {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.5px;
    }

    .logo-highlight {
        color: #4a7cff;
        background: linear-gradient(135deg, #4a7cff, #00f0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .logo-badge {
        font-size: 0.55rem;
        font-weight: 600;
        background: rgba(74, 124, 255, 0.15);
        color: #4a7cff;
        padding: 2px 10px;
        border-radius: 50px;
        letter-spacing: 1px;
        border: 1px solid rgba(74, 124, 255, 0.2);
    }

    /* Navigation items */
    .navbar-nav .nav-item {
        margin: 0 2px;
    }

    .navbar-nav .nav-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 18px !important;
        border-radius: 10px;
        color: rgba(255, 255, 255, 0.65) !important;
        font-weight: 500;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        position: relative;
    }

    .navbar-nav .nav-link .nav-icon {
        font-size: 0.8rem;
        opacity: 0.5;
        transition: all 0.3s ease;
    }

    .navbar-nav .nav-link:hover {
        color: #fff !important;
        background: rgba(74, 124, 255, 0.08);
    }

    .navbar-nav .nav-link:hover .nav-icon {
        opacity: 1;
        color: #4a7cff;
    }

    .navbar-nav .nav-link.active {
        color: #fff !important;
        background: rgba(74, 124, 255, 0.12);
    }

    .navbar-nav .nav-link.active .nav-icon {
        opacity: 1;
        color: #4a7cff;
    }

    /* Indicateur de navigation */
    .nav-indicator {
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 2px;
        background: linear-gradient(90deg, #4a7cff, #00f0ff);
        border-radius: 2px;
        transition: width 0.3s ease;
    }

    .navbar-nav .nav-link:hover .nav-indicator,
    .navbar-nav .nav-link.active .nav-indicator {
        width: 60%;
    }

    /* Dropdown cyber */
    .dropdown-menu-cyber {
        background: #111128 !important;
        border: 1px solid rgba(74, 124, 255, 0.15) !important;
        border-radius: 12px !important;
        padding: 8px !important;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6) !important;
        min-width: 200px !important;
    }

    .dropdown-menu-cyber .dropdown-item {
        color: #b8c6ff !important;
        padding: 10px 16px !important;
        border-radius: 8px !important;
        font-size: 0.85rem !important;
        transition: all 0.3s ease !important;
    }

    .dropdown-menu-cyber .dropdown-item:hover {
        background: rgba(74, 124, 255, 0.1) !important;
        color: #fff !important;
        transform: translateX(4px);
    }

    .dropdown-menu-cyber .dropdown-item i {
        color: #4a7cff;
        width: 20px;
    }

    .dropdown-menu-cyber .dropdown-divider {
        border-color: rgba(74, 124, 255, 0.08) !important;
    }

    /* Actions navbar */
    .navbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* Recherche */
    .search-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .search-input {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(74, 124, 255, 0.12);
        border-radius: 50px;
        padding: 6px 16px 6px 18px;
        color: #fff;
        font-size: 0.85rem;
        width: 140px;
        transition: all 0.3s ease;
    }

    .search-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .search-input:focus {
        outline: none;
        border-color: #4a7cff;
        background: rgba(255, 255, 255, 0.06);
        width: 180px;
        box-shadow: 0 0 30px rgba(74, 124, 255, 0.05);
    }

    .search-btn {
        position: absolute;
        right: 4px;
        background: transparent;
        border: none;
        color: rgba(255, 255, 255, 0.3);
        padding: 4px 12px;
        transition: all 0.3s ease;
    }

    .search-btn:hover {
        color: #4a7cff;
    }

    /* Bouton CTA Neon */
    .btn-cta-neon {
        display: inline-flex;
        align-items: center;
        background: linear-gradient(135deg, #4a7cff, #6c5ce7);
        color: #fff !important;
        padding: 8px 20px;
        border-radius: 50px;
        font-weight: 600;
        font-size: 0.85rem;
        text-decoration: none;
        transition: all 0.3s ease;
        box-shadow: 0 0 30px rgba(74, 124, 255, 0.15);
    }

    .btn-cta-neon:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 40px rgba(74, 124, 255, 0.3);
        color: #fff !important;
    }

    /* Mobile search bar */
    .mobile-search-bar {
        position: fixed;
        top: 76px;
        left: 0;
        width: 100%;
        padding: 10px 16px;
        background: rgba(10, 10, 26, 0.95);
        border-bottom: 1px solid rgba(74, 124, 255, 0.06);
        z-index: 999;
        transform: translateY(-100%);
        transition: transform 0.3s ease;
    }

    .mobile-search-bar.visible {
        transform: translateY(0);
    }

    .mobile-search-form {
        display: flex;
        gap: 8px;
    }

    .mobile-search-input {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(74, 124, 255, 0.12);
        border-radius: 50px;
        padding: 8px 16px;
        color: #fff;
        font-size: 0.9rem;
    }

    .mobile-search-input::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }

    .mobile-search-input:focus {
        outline: none;
        border-color: #4a7cff;
    }

    .mobile-search-btn {
        background: #4a7cff;
        border: none;
        border-radius: 50px;
        padding: 8px 20px;
        color: #fff;
        transition: all 0.3s ease;
    }

    .mobile-search-btn:hover {
        background: #3a6bef;
    }

    /* Responsive */
    @media (max-width: 992px) {
        .navbar-actions {
            display: none !important;
        }
        .navbar-nav .nav-link {
            padding: 10px 16px !important;
        }
        .logo-text {
            font-size: 1rem;
        }
        .logo-badge {
            display: none;
        }
        .mobile-search-bar.visible {
            transform: translateY(0);
        }
    }

    @media (max-width: 576px) {
        .logo-text {
            font-size: 0.9rem;
        }
        .logo-icon {
            font-size: 1.2rem;
        }
        #mainNav {
            padding: 6px 0;
        }
    }

    /* Scroll effect */
    #mainNav.scrolled {
        background: rgba(10, 10, 26, 0.98) !important;
        border-bottom: 1px solid rgba(74, 124, 255, 0.15);
        padding: 6px 0;
    }

    #mainNav.scrolled .logo-icon {
        font-size: 1.3rem;
    }

    #mainNav.scrolled .logo-text {
        font-size: 1rem;
    }
</style>

<script>
    // Gestion du scroll pour la navbar
    document.addEventListener('DOMContentLoaded', function() {
        const navbar = document.getElementById('mainNav');
        const mobileSearch = document.querySelector('.mobile-search-bar');

        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }

            // Afficher/cacher la recherche mobile
            if (mobileSearch) {
                if (window.scrollY > 150) {
                    mobileSearch.classList.remove('visible');
                } else {
                    mobileSearch.classList.add('visible');
                }
            }
        });

        // Initialiser la recherche mobile visible
        if (mobileSearch) {
            mobileSearch.classList.add('visible');
        }
    });

    // Gestion du loader
    document.addEventListener('DOMContentLoaded', function() {
        // Déjà géré ci-dessus
    });
</script>
