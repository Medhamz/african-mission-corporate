<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">African Mission Corporate</title>

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6.5 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body>

<!-- ============================================ -->
<!-- LOADER PREMIUM (Animation de chargement)     -->
<!-- ============================================ -->
<div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a1628; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.5s ease;">
    <div class="spinner-border text-warning" style="width:70px; height:70px;" role="status">
        <span class="visually-hidden">Chargement...</span>
    </div>
    <p class="text-white mt-3" style="font-family:'Inter',sans-serif; letter-spacing:2px; font-weight:300;">CHARGEMENT</p>
    <div style="width:200px; height:2px; background:rgba(255,255,255,0.1); margin-top:10px; border-radius:2px; overflow:hidden;">
        <div id="loaderProgress" style="width:0%; height:100%; background:#ffc107; border-radius:2px; transition:width 0.3s ease;"></div>
    </div>
</div>

<script>
    // Loader avec progression simulée
    document.addEventListener('DOMContentLoaded', function() {
        const loader = document.getElementById('loader');
        const progress = document.getElementById('loaderProgress');
        let width = 0;
        const interval = setInterval(() => {
            width += 1 + Math.random() * 3;
            if (width >= 95) { clearInterval(interval); }
            progress.style.width = Math.min(width, 95) + '%';
        }, 50);

        window.addEventListener('load', function() {
            clearInterval(interval);
            progress.style.width = '100%';
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 600);
            }, 400);
        });
    });
</script>

<!-- ============================================ -->
<!-- NAVBAR PREMIUM AVEC BARRE DE RECHERCHE      -->
<!-- ============================================ -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%); box-shadow: 0 2px 20px rgba(0,0,0,0.3);">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="/">
            <i class="fas fa-globe-africa me-2 text-warning"></i>
            African Mission Corporate
        </a>

        <!-- Toggler pour mobile -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navigation -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}">Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="/about" th:classappend="${#httpServletRequest.requestURI == '/about' ? 'active' : ''}">À propos</a></li>
                <li class="nav-item"><a class="nav-link" href="/services" th:classappend="${#httpServletRequest.requestURI == '/services' ? 'active' : ''}">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="/activities" th:classappend="${#httpServletRequest.requestURI == '/activities' ? 'active' : ''}">Activités</a></li>
                <li class="nav-item"><a class="nav-link" href="/projects" th:classappend="${#httpServletRequest.requestURI == '/projects' ? 'active' : ''}">Projets</a></li>
                <li class="nav-item"><a class="nav-link" href="/team" th:classappend="${#httpServletRequest.requestURI == '/team' ? 'active' : ''}">Équipe</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact" th:classappend="${#httpServletRequest.requestURI == '/contact' ? 'active' : ''}">Contact</a></li>
            </ul>

            <!-- Barre de recherche premium -->
            <form class="d-flex" action="/search" method="get">
                <div class="input-group" style="border-radius: 50px; overflow: hidden; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);">
                    <input class="form-control" type="search" name="q" placeholder="Rechercher..."
                           style="background: transparent; border: none; color: #fff; padding: 8px 16px; width: 180px; font-size: 0.9rem;"
                           aria-label="Rechercher">
                    <button class="btn" type="submit" style="background: #ffc107; color: #0a1628; border-radius: 0; padding: 8px 16px;">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</nav>
