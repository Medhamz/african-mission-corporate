<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">African Mission Corporate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body>

<!-- ============================================ -->
<!-- NOUVELLE NAVBAR - VERSION 2.0               -->
<!-- ============================================ -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: #0a0a1a !important; border-bottom: 2px solid #4a7cff; padding: 8px 0; box-shadow: 0 0 40px rgba(74,124,255,0.15);">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand fw-bold" href="/" style="color: #fff; font-size: 1.3rem;">
            <i class="fas fa-globe-africa" style="color: #4a7cff; margin-right: 10px;"></i>
            <span style="color: #4a7cff;">African</span> Mission <span style="font-size: 0.6rem; color: #4a7cff; border:1px solid #4a7cff; padding:2px 8px; border-radius:20px; margin-left:6px;">SARL</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border: 1px solid #4a7cff; padding: 6px 12px;">
            <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto me-3" style="gap: 4px;">
                <li class="nav-item"><a class="nav-link" href="/" th:classappend="${#httpServletRequest.requestURI == '/' ? 'active' : ''}" style="color: rgba(255,255,255,0.7); padding: 8px 18px; border-radius: 8px; transition: all 0.3s;">🏠 Accueil</a></li>
                <li class="nav-item"><a class="nav-link" href="/about" th:classappend="${#httpServletRequest.requestURI == '/about' ? 'active' : ''}" style="color: rgba(255,255,255,0.7); padding: 8px 18px; border-radius: 8px; transition: all 0.3s;">ℹ️ À propos</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="servicesDropdown" role="button" data-bs-toggle="dropdown" style="color: rgba(255,255,255,0.7); padding: 8px 18px; border-radius: 8px; transition: all 0.3s;">
                        ⚙️ Services
                    </a>
                    <ul class="dropdown-menu" style="background: #111128; border: 1px solid #4a7cff;">
                        <li><a class="dropdown-item" href="/services" style="color: #b8c6ff;">📋 Nos services</a></li>
                        <li><a class="dropdown-item" href="/activities" style="color: #b8c6ff;">📌 Activités</a></li>
                        <li><a class="dropdown-item" href="/projects" style="color: #b8c6ff;">🚀 Projets</a></li>
                        <li><hr class="dropdown-divider" style="border-color: #4a7cff;"></li>
                        <li><a class="dropdown-item" href="/faq" style="color: #b8c6ff;">❓ FAQ</a></li>
                    </ul>
                </li>
                <li class="nav-item"><a class="nav-link" href="/team" th:classappend="${#httpServletRequest.requestURI == '/team' ? 'active' : ''}" style="color: rgba(255,255,255,0.7); padding: 8px 18px; border-radius: 8px; transition: all 0.3s;">👥 Équipe</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact" th:classappend="${#httpServletRequest.requestURI == '/contact' ? 'active' : ''}" style="color: rgba(255,255,255,0.7); padding: 8px 18px; border-radius: 8px; transition: all 0.3s;">✉️ Contact</a></li>
            </ul>

            <!-- Barre de recherche -->
            <form action="/search" method="get" class="d-flex">
                <div style="display: flex; align-items: center; background: rgba(255,255,255,0.05); border-radius: 50px; border: 1px solid rgba(74,124,255,0.2); padding: 2px;">
                    <input type="search" name="q" placeholder="Rechercher..." style="background: transparent; border: none; color: #fff; padding: 6px 14px; width: 140px; font-size: 0.85rem;">
                    <button type="submit" style="background: #4a7cff; border: none; color: #fff; border-radius: 50px; padding: 6px 16px; font-size: 0.85rem; cursor: pointer;">🔍</button>
                </div>
            </form>
        </div>
    </div>
</nav>

<!-- STYLE INTÉGRÉ DIRECTEMENT POUR TEST -->
<style>
    .navbar .nav-link:hover {
        color: #4a7cff !important;
        background: rgba(74, 124, 255, 0.08) !important;
    }
    .navbar .nav-link.active {
        color: #4a7cff !important;
        background: rgba(74, 124, 255, 0.12) !important;
    }
    .dropdown-item:hover {
        background: rgba(74, 124, 255, 0.1) !important;
        color: #fff !important;
    }
</style>

<script>
    // Gestion du scroll
    document.addEventListener('DOMContentLoaded', function() {
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(10, 10, 26, 0.98) !important';
                navbar.style.boxShadow = '0 4px 30px rgba(0,0,0,0.5)';
            } else {
                navbar.style.background = '#0a0a1a !important';
                navbar.style.boxShadow = '0 0 40px rgba(74,124,255,0.15)';
            }
        });
    });
</script>

</body>
</html>
