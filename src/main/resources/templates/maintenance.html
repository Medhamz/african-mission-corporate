<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - African Mission Corporate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0a0a1a; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .maintenance-box { text-align: center; max-width: 500px; padding: 40px; background: #111128; border-radius: 16px; border: 1px solid rgba(74,124,255,0.1); }
        .maintenance-box i { font-size: 4rem; color: #f59e0b; margin-bottom: 20px; }
        .maintenance-box h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
        .maintenance-box p { color: #94a3b8; font-size: 1.1rem; }
        .maintenance-box .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #f59e0b; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="maintenance-box">
    <i class="fas fa-tools"></i>
    <h1>Site en maintenance</h1>
    <p>Nous travaillons actuellement à l'amélioration de notre site. Merci de votre compréhension.</p>
    <div class="spinner"></div>
</div>
</body>
</html>
