<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Gestion des pays')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Carte du Monde', 'Gestion des pays')"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Pays</h4>
                <a th:href="@{/admin/countries/add}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Ajouter un pays
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Drapeau</th>
                                <th>Nom</th>
                                <th>Capitale</th>
                                <th>Projets</th>
                                <th>Partenaires</th>
                                <th>Investissement</th>
                                <th>Type</th>
                                <th>Actif</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="c : ${countries}">
                                <td th:text="${c.id}"></td>
                                <td th:text="${c.flag}"></td>
                                <td th:text="${c.name}"></td>
                                <td th:text="${c.capital}"></td>
                                <td th:text="${c.projects}"></td>
                                <td th:text="${c.partners}"></td>
                                <td th:text="${c.investment}"></td>
                                <td><span class="badge" th:text="${c.type}"></span></td>
                                <td>
                                        <span class="badge" th:class="${c.isActive} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${c.isActive} ? 'Actif' : 'Inactif'"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/countries/edit/{id}(id=${c.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                    <a th:href="@{/admin/countries/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')"><i class="fas fa-trash"></i></a>
                                    <a th:href="@{/admin/countries/toggle/{id}(id=${c.id})}" class="btn btn-sm btn-secondary"><i class="fas fa-sync"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${countries.isEmpty()}">
                                <td colspan="10" class="text-center text-muted">Aucun pays.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
