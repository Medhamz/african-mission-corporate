<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Formulaire pays')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Carte du Monde', 'Formulaire pays')"></div>

        <div class="container-fluid mt-4">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/countries/save}" th:object="${country}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nom du pays</label>
                                <input type="text" class="form-control" th:field="*{name}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Drapeau (emoji)</label>
                                <input type="text" class="form-control" th:field="*{flag}" placeholder="🇲🇱">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Latitude</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{latitude}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Longitude</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{longitude}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Capitale</label>
                                <input type="text" class="form-control" th:field="*{capital}">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Projets</label>
                                <input type="number" class="form-control" th:field="*{projects}" min="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Partenaires</label>
                                <input type="number" class="form-control" th:field="*{partners}" min="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Investissement</label>
                                <input type="text" class="form-control" th:field="*{investment}" placeholder="1.2M FCFA">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Type</label>
                                <select class="form-select" th:field="*{type}">
                                    <option value="project">Projet</option>
                                    <option value="partner">Partenaire</option>
                                    <option value="investment">Investissement</option>
                                </select>
                            </div>
                            <div class="col-12 form-check">
                                <input type="checkbox" class="form-check-input" th:field="*{isActive}">
                                <label class="form-check-label">Actif</label>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">Enregistrer</button>
                                <a th:href="@{/admin/countries}" class="btn btn-secondary">Annuler</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
