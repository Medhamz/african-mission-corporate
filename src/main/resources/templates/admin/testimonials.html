<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .table { color: var(--text-secondary); }
        .table th { color: var(--text-primary); border-color: var(--border-light); }
        .table td { border-color: var(--border-light); vertical-align: middle; }
        .btn-danger-sm { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; padding: 4px 12px; font-size: 0.8rem; border-radius: 6px; }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-success-sm { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; padding: 4px 12px; font-size: 0.8rem; border-radius: 6px; }
        .btn-success-sm:hover { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-pending { background: #f59e0b; color: #fff; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .badge-approved { background: #22c55e; color: #fff; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .rating-stars { color: #f59e0b; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-star" style="color: var(--primary-blue);"></i> Témoignages</h1>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addTestimonialModal" style="background: var(--gradient-main); border: none;">
            <i class="fas fa-plus"></i> Ajouter
        </button>
    </header>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Client</th>
                <th>Entreprise</th>
                <th>Contenu</th>
                <th>Note</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${testimonials}">
                <td th:text="${t.id}">1</td>
                <td th:text="${t.clientName}" style="color: var(--text-primary); font-weight: 500;">Client</td>
                <td th:text="${t.company}">Entreprise</td>
                <td th:text="${t.content.length() > 50 ? t.content.substring(0,50) + '...' : t.content}">Contenu</td>
                <td>
                    <span class="rating-stars" th:each="i : ${#numbers.sequence(1, t.rating)}">★</span>
                    <span class="rating-stars" style="opacity:0.2;" th:each="i : ${#numbers.sequence(t.rating + 1, 5)}">★</span>
                </td>
                <td>
                    <span th:if="${t.isApproved}" class="badge-approved">Approuvé</span>
                    <span th:unless="${t.isApproved}" class="badge-pending">En attente</span>
                </td>
                <td>
                    <form method="post" th:action="@{/admin/testimonials/approve/{id}(id=${t.id})}" style="display:inline;" th:unless="${t.isApproved}">
                        <button type="submit" class="btn-success-sm"><i class="fas fa-check"></i></button>
                    </form>
                    <form method="post" th:action="@{/admin/testimonials/delete/{id}(id=${t.id})}" style="display:inline;" onsubmit="return confirm('Supprimer ce témoignage ?')">
                        <button type="submit" class="btn-danger-sm"><i class="fas fa-trash"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${testimonials.isEmpty()}">
                <td colspan="7" class="text-center text-muted" style="padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 2rem; opacity: 0.3;"></i>
                    <p>Aucun témoignage</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Ajout Témoignage -->
<div class="modal fade" id="addTestimonialModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--bg-card); border: 1px solid var(--border-light);">
            <div class="modal-header" style="border-color: var(--border-light);">
                <h5 class="modal-title" style="color: var(--text-primary);">Ajouter un témoignage</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" style="filter: invert(1);"></button>
            </div>
            <form method="post" action="/admin/testimonials/add">
                <div class="modal-body">
                    <div class="mb-3">
                        <label style="color: var(--text-secondary);">Nom du client</label>
                        <input type="text" name="clientName" class="form-control" required style="background: var(--bg-primary); border: 1px solid var(--border-light); color: var(--text-primary);">
                    </div>
                    <div class="mb-3">
                        <label style="color: var(--text-secondary);">Entreprise</label>
                        <input type="text" name="company" class="form-control" style="background: var(--bg-primary); border: 1px solid var(--border-light); color: var(--text-primary);">
                    </div>
                    <div class="mb-3">
                        <label style="color: var(--text-secondary);">Témoignage</label>
                        <textarea name="content" class="form-control" rows="3" required style="background: var(--bg-primary); border: 1px solid var(--border-light); color: var(--text-primary);"></textarea>
                    </div>
                    <div class="mb-3">
                        <label style="color: var(--text-secondary);">Note (1-5)</label>
                        <select name="rating" class="form-control" style="background: var(--bg-primary); border: 1px solid var(--border-light); color: var(--text-primary);">
                            <option value="5">★★★★★</option>
                            <option value="4">★★★★</option>
                            <option value="3">★★★</option>
                            <option value="2">★★</option>
                            <option value="1">★</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer" style="border-color: var(--border-light);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background: var(--bg-secondary); color: var(--text-secondary); border: none;">Annuler</button>
                    <button type="submit" class="btn" style="background: var(--gradient-main); border: none; color: #fff;">Ajouter</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
