<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 800px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 30px; }
        .btn-primary { background: var(--gradient-main); border: none; color: #fff; padding: 10px 24px; border-radius: var(--radius-sm); font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.15); color: #fff; }
        .btn-danger { background: #ef4444; border: none; color: #fff; padding: 10px 24px; border-radius: var(--radius-sm); font-weight: 600; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(239,68,68,0.2); color: #fff; }
        .status-badge { font-size: 1.2rem; padding: 6px 20px; border-radius: 50px; }
        .status-badge.on { background: #22c55e; color: #fff; }
        .status-badge.off { background: #ef4444; color: #fff; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-tools" style="color: var(--primary-blue);"></i> Mode maintenance</h1>
        </div>
    </header>

    <div class="card">
        <div class="text-center">
            <i class="fas fa-hard-hat" style="font-size: 3rem; color: var(--primary-blue); opacity: 0.3;"></i>
            <h4 style="color: var(--text-primary); margin: 16px 0;">État actuel</h4>
            <div th:if="${isEnabled}" class="status-badge on">🔧 Mode maintenance activé</div>
            <div th:unless="${isEnabled}" class="status-badge off">✅ Site accessible</div>

            <div style="margin-top: 24px; display: flex; gap: 12px; justify-content: center;">
                <form method="post" action="/admin/maintenance/enable">
                    <button type="submit" class="btn-danger" th:disabled="${isEnabled}">Activer le mode maintenance</button>
                </form>
                <form method="post" action="/admin/maintenance/disable">
                    <button type="submit" class="btn-primary" th:disabled="${!isEnabled}">Désactiver</button>
                </form>
            </div>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 16px;">
                En mode maintenance, seuls les administrateurs peuvent accéder au site.
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
