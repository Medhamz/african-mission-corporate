<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Gestion du Kiosque')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Mode Kiosque', 'Gestion des slides')"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Slides du kiosque</h4>
                <a th:href="@{/admin/kiosk/add}" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter une slide</a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Titre</th>
                                <th>Type</th>
                                <th>Ordre</th>
                                <th>Actif</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="s : ${slides}">
                                <td th:text="${s.id}"></td>
                                <td th:text="${s.title}"></td>
                                <td th:text="${s.type}"></td>
                                <td th:text="${s.displayOrder}"></td>
                                <td>
                                        <span class="badge" th:class="${s.isActive} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${s.isActive} ? 'Actif' : 'Inactif'"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/kiosk/edit/{id}(id=${s.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                    <a th:href="@{/admin/kiosk/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')"><i class="fas fa-trash"></i></a>
                                    <a th:href="@{/admin/kiosk/toggle/{id}(id=${s.id})}" class="btn btn-sm btn-secondary"><i class="fas fa-sync"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${slides.isEmpty()}">
                                <td colspan="6" class="text-center text-muted">Aucune slide.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
