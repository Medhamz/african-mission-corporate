<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Summernote WYSIWYG -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .form-control { background: var(--bg-primary); border: 1px solid var(--border-light); color: var(--text-primary); }
        .form-control:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn { background: var(--gradient-main); border: none; color: #fff; padding: 10px 24px; border-radius: var(--radius-sm); font-weight: 600; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(59,130,246,0.15); color: #fff; }
        .note-editor { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-sm); }
        .note-editor .note-toolbar { background: var(--bg-secondary); border-bottom: 1px solid var(--border-light); }
        .note-editor .note-editable { background: var(--bg-card); color: var(--text-primary); }
        .note-editor .note-editable:focus { outline: none; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/pages" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-edit" style="color: var(--primary-blue);"></i> Modifier la page</h1>
        </div>
    </header>

    <form method="post" th:action="@{/admin/pages/update/{id}(id=${page.id})}">
        <div class="mb-3">
            <label style="color: var(--text-secondary);">Titre</label>
            <input type="text" name="title" class="form-control" th:value="${page.title}" required>
        </div>
        <div class="mb-3">
            <label style="color: var(--text-secondary);">Slug</label>
            <input type="text" class="form-control" th:value="${page.slug}" disabled style="opacity:0.6;">
        </div>
        <div class="mb-3">
            <label style="color: var(--text-secondary);">Contenu</label>
            <textarea name="content" id="editor" rows="10" class="form-control" th:text="${page.content}"></textarea>
        </div>
        <button type="submit" class="btn">Enregistrer</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
<script>
    $(document).ready(function() {
        $('#editor').summernote({
            height: 400,
            toolbar: [
                ['style', ['bold', 'italic', 'underline', 'clear']],
                ['font', ['strikethrough', 'superscript', 'subscript']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['fullscreen', 'codeview']]
            ]
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
