<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .chat-container { display: flex; gap: 24px; height: calc(100vh - 200px); min-height: 500px; }
        .sessions-list { width: 320px; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); overflow: hidden; display: flex; flex-direction: column; flex-shrink: 0; }
        .sessions-list-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); color: var(--text-primary); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .sessions-list-header .badge { background: rgba(59,130,246,0.1); color: var(--primary-blue); padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .sessions-scroll { flex: 1; overflow-y: auto; padding: 8px; }
        .session-item { padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.3s ease; margin-bottom: 4px; border: 1px solid transparent; }
        .session-item:hover { background: rgba(59,130,246,0.04); border-color: rgba(59,130,246,0.06); }
        .session-item.active { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.12); }
        .session-item .session-name { color: var(--text-primary); font-weight: 500; font-size: 0.9rem; }
        .session-item .session-status { font-size: 0.65rem; padding: 2px 10px; border-radius: 50px; }
        .session-item .session-status.online { background: rgba(34,197,94,0.1); color: #22c55e; }
        .session-item .session-status.offline { background: rgba(148,163,184,0.1); color: var(--text-muted); }
        .session-item .session-time { font-size: 0.65rem; color: var(--text-muted); }
        .session-item .unread-badge { background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 8px; font-size: 0.6rem; font-weight: 600; }
        .chat-area { flex: 1; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .chat-header .chat-user { color: var(--text-primary); font-weight: 600; }
        .chat-header .chat-user small { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .chat-message { margin-bottom: 16px; display: flex; flex-direction: column; }
        .chat-message.visitor { align-items: flex-start; }
        .chat-message.admin { align-items: flex-end; }
        .chat-message .bubble { max-width: 70%; padding: 12px 18px; border-radius: var(--radius-md); font-size: 0.9rem; line-height: 1.5; }
        .chat-message.visitor .bubble { background: var(--bg-secondary); color: var(--text-primary); border-bottom-left-radius: 4px; }
        .chat-message.admin .bubble { background: var(--gradient-main); color: #fff; border-bottom-right-radius: 4px; }
        .chat-message .time { font-size: 0.6rem; color: var(--text-muted); margin-top: 4px; }
        .chat-input-area { padding: 16px 24px; border-top: 1px solid var(--border-light); display: flex; gap: 12px; }
        .chat-input-area input { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-full); padding: 10px 18px; color: var(--text-primary); outline: none; }
        .chat-input-area input:focus { border-color: var(--primary-blue); }
        .chat-input-area button { background: var(--gradient-main); border: none; color: #fff; border-radius: var(--radius-full); padding: 10px 24px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .chat-input-area button:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(59,130,246,0.2); }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); padding: 40px; text-align: center; }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
        .visitor-name-input { display: flex; gap: 8px; padding: 16px 24px; border-bottom: 1px solid var(--border-light); background: var(--bg-card); }
        .visitor-name-input input { flex: 1; background: var(--bg-secondary); border: 1px solid var(--border-light); border-radius: var(--radius-full); padding: 8px 16px; color: var(--text-primary); outline: none; }
        .visitor-name-input button { background: var(--gradient-main); border: none; color: #fff; border-radius: var(--radius-full); padding: 8px 20px; font-weight: 600; cursor: pointer; }
        .no-session { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
        .no-session i { font-size: 4rem; opacity: 0.1; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-comments" style="color: var(--primary-blue);"></i> Chat en direct</h1>
        </div>
        <span style="color: var(--text-secondary); font-size: 0.85rem;">
            <i class="fas fa-circle" style="color: #22c55e; font-size: 0.5rem;"></i>
            <span id="sessionCount">0</span> visiteurs en ligne
        </span>
    </header>

    <div class="chat-container">
        <!-- Liste des sessions -->
        <div class="sessions-list">
            <div class="sessions-list-header">
                <span>Conversations</span>
                <span class="badge" id="badgeCount">0</span>
            </div>
            <div class="sessions-scroll" id="sessionsList">
                <div class="no-session" id="noSession">
                    <i class="fas fa-users"></i>
                    <p>Aucun visiteur en ligne</p>
                    <p style="font-size: 0.85rem;">Les visiteurs apparaîtront ici</p>
                </div>
            </div>
        </div>

        <!-- Zone de chat -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-user">
                    <span id="chatVisitorName">Sélectionnez une conversation</span>
                    <small id="chatVisitorStatus"></small>
                </div>
                <button onclick="closeSession()" class="btn btn-sm" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: var(--radius-full); padding: 4px 16px;">
                    <i class="fas fa-times"></i> Fermer
                </button>
            </div>

            <!-- Zone des messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <i class="fas fa-comment-dots"></i>
                    <p>Sélectionnez une conversation pour commencer</p>
                </div>
            </div>

            <!-- Zone de saisie -->
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Écrire un message..." disabled>
                <button id="sendBtn" disabled><i class="fas fa-paper-plane"></i> Envoyer</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentSessionId = null;
    let currentVisitorName = null;
    let sessions = [];
    let pollInterval = null;

    // ============================================
    // CHARGER LES SESSIONS ACTIVES
    // ============================================
    function loadSessions() {
        fetch('/chat/session/with-visitor')
            .then(response => response.json())
            .then(data => {
                sessions = data;
                renderSessions(data);
                document.getElementById('sessionCount').textContent = data.length;
                document.getElementById('badgeCount').textContent = data.length;
            })
            .catch(error => console.error('Erreur chargement sessions:', error));
    }

    // ============================================
    // AFFICHER LES SESSIONS
    // ============================================
    function renderSessions(sessions) {
        const container = document.getElementById('sessionsList');
        const noSession = document.getElementById('noSession');

        if (!sessions || sessions.length === 0) {
            container.innerHTML = `
                <div class="no-session">
                    <i class="fas fa-users"></i>
                    <p>Aucun visiteur en ligne</p>
                    <p style="font-size: 0.85rem;">Les visiteurs apparaîtront ici</p>
                </div>
            `;
            return;
        }

        container.innerHTML = sessions.map(session => `
            <div class="session-item ${currentSessionId === session.sessionId ? 'active' : ''}"
                 onclick="selectSession('${session.sessionId}', '${session.visitorName || 'Visiteur'}')"
                 data-session="${session.sessionId}">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span class="session-name">${session.visitorName || 'Visiteur'}</span>
                    <span class="session-status online">● En ligne</span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                    <span class="session-time">${new Date(session.lastActivity).toLocaleTimeString()}</span>
                    <span class="unread-badge" id="unread_${session.sessionId}" style="display: none;">0</span>
                </div>
            </div>
        `).join('');
    }

    // ============================================
    // SÉLECTIONNER UNE SESSION
    // ============================================
    function selectSession(sessionId, visitorName) {
        currentSessionId = sessionId;
        currentVisitorName = visitorName;

        // Mettre à jour l'UI
        document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`[data-session="${sessionId}"]`)?.classList.add('active');

        document.getElementById('chatVisitorName').textContent = visitorName || 'Visiteur';
        document.getElementById('chatVisitorStatus').textContent = '● En ligne';
        document.getElementById('chatInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;

        // Charger les messages
        loadMessages(sessionId);

        // Marquer comme lu
        fetch(`/chat/messages?sessionId=${sessionId}`, { method: 'GET' })
            .then(response => response.json())
            .then(data => {
                // Les messages sont marqués comme lus automatiquement
                const unreadBadge = document.getElementById(`unread_${sessionId}`);
                if (unreadBadge) unreadBadge.style.display = 'none';
            });
    }

    // ============================================
    // CHARGER LES MESSAGES
    // ============================================
    function loadMessages(sessionId) {
        fetch(`/chat/messages?sessionId=${sessionId}`)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('chatMessages');
                if (!data.messages || data.messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comment-dots"></i>
                            <p>Aucun message. Démarrez la conversation !</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.messages.map(msg => `
                    <div class="chat-message ${msg.sender === 'admin' ? 'admin' : 'visitor'}">
                        <div class="bubble">
                            ${escapeHtml(msg.message)}
                            <div style="font-size: 0.6rem; opacity: 0.6; margin-top: 4px;">
                                ${msg.sender === 'admin' ? 'Admin' : currentVisitorName || 'Visiteur'} • ${new Date(msg.sentAt).toLocaleTimeString()}
                            </div>
                        </div>
                    </div>
                `).join('');

                container.scrollTop = container.scrollHeight;
            })
            .catch(error => console.error('Erreur chargement messages:', error));
    }

    // ============================================
    // ENVOYER UN MESSAGE (ADMIN)
    // ============================================
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();

        if (!message || !currentSessionId) return;

        fetch('/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                sessionId: currentSessionId,
                message: message,
                sender: 'admin'
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                input.value = '';
                // Recharger les messages
                loadMessages(currentSessionId);
                // Marquer comme lu
                const unreadBadge = document.getElementById(`unread_${currentSessionId}`);
                if (unreadBadge) unreadBadge.style.display = 'none';
            } else {
                alert('Erreur: ' + data.message);
            }
        })
        .catch(error => {
            console.error('Erreur envoi:', error);
            alert('Erreur de connexion');
        });
    }

    // ============================================
    // FERMER UNE SESSION
    // ============================================
    function closeSession() {
        if (!currentSessionId) return;
        if (!confirm('Fermer cette conversation ?')) return;

        fetch(`/chat/session/close?sessionId=${currentSessionId}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                currentSessionId = null;
                document.getElementById('chatVisitorName').textContent = 'Sélectionnez une conversation';
                document.getElementById('chatVisitorStatus').textContent = '';
                document.getElementById('chatMessages').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>Sélectionnez une conversation pour commencer</p>
                    </div>
                `;
                document.getElementById('chatInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                loadSessions();
            }
        });
    }

    // ============================================
    // ÉCHAPPER LE HTML
    // ============================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============================================
    // ÉVÉNEMENTS
    // ============================================
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // ============================================
    // POLLING - METTRE À JOUR TOUTES LES 3 SECONDES
    // ============================================
    loadSessions();
    pollInterval = setInterval(() => {
        loadSessions();
        if (currentSessionId) {
            loadMessages(currentSessionId);
        }
    }, 3000);
</script>

</body>
</html>
