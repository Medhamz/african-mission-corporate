<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .table { color: var(--text-secondary); }
        .table th { color: var(--text-primary); border-color: var(--border-light); }
        .table td { border-color: var(--border-light); vertical-align: middle; }
        .message-unread { border-left: 3px solid var(--primary-blue); }
        .message-read { opacity: 0.6; }
        .badge-unread { background: var(--primary-blue); color: #fff; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .badge-read { background: var(--bg-secondary); color: var(--text-muted); padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .btn-danger-sm { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: 6px; }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-success-sm { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; border-radius: 6px; }
        .btn-success-sm:hover { background: rgba(34,197,94,0.2); color: #22c55e; }
        .message-content { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-envelope" style="color: var(--primary-blue);"></i> Messages de contact</h1>
        </div>
    </header>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Sujet</th>
                <th>Message</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="msg : ${messages}" th:classappend="${msg.isRead ? 'message-read' : 'message-unread'}">
                <td th:text="${msg.id}">1</td>
                <td th:text="${msg.name}">Nom</td>
                <td><a th:href="'mailto:' + ${msg.email}" th:text="${msg.email}" style="color: var(--primary-blue); text-decoration: none;"></a></td>
                <td th:text="${msg.subject}">Sujet</td>
                <td class="message-content" th:text="${msg.message}">Message</td>
                <td>
                    <span th:if="${msg.isRead}" class="badge-read">Lu</span>
                    <span th:unless="${msg.isRead}" class="badge-unread">Non lu</span>
                </td>
                <td>
                    <form method="post" th:action="@{/admin/messages/read/{id}(id=${msg.id})}" style="display:inline;">
                        <button type="submit" class="btn-success-sm btn-sm" th:disabled="${msg.isRead}"><i class="fas fa-check"></i></button>
                    </form>
                    <form method="post" th:action="@{/admin/messages/delete/{id}(id=${msg.id})}" style="display:inline;" onsubmit="return confirm('Supprimer ce message ?')">
                        <button type="submit" class="btn-danger-sm btn-sm"><i class="fas fa-trash"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${messages.isEmpty()}">
                <td colspan="7" class="text-center text-muted" style="padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 2rem; opacity: 0.3;"></i>
                    <p>Aucun message pour le moment</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
