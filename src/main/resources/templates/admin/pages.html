<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .table { color: var(--text-secondary); }
        .table th { color: var(--text-primary); border-color: var(--border-light); }
        .table td { border-color: var(--border-light); vertical-align: middle; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .btn-danger-sm { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: 6px; }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-success-sm { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; border-radius: 6px; }
        .btn-success-sm:hover { background: rgba(34,197,94,0.2); color: #22c55e; }
        .badge-active { background: #22c55e; color: #fff; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
        .badge-inactive { background: #ef4444; color: #fff; padding: 2px 10px; border-radius: 50px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-file-alt" style="color: var(--primary-blue);"></i> Pages statiques</h1>
        </div>
    </header>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Titre</th>
                <th>Slug</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pages}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.title}" style="color: var(--text-primary); font-weight: 500;">Titre</td>
                <td><code th:text="${p.slug}">slug</code></td>
                <td>
                    <span th:if="${p.isActive}" class="badge-active">Actif</span>
                    <span th:unless="${p.isActive}" class="badge-inactive">Inactif</span>
                </td>
                <td>
                    <a th:href="@{/admin/pages/edit/{id}(id=${p.id})}" class="btn-success-sm btn-sm"><i class="fas fa-edit"></i></a>
                    <form method="post" th:action="@{/admin/pages/toggle/{id}(id=${p.id})}" style="display:inline;">
                        <button type="submit" class="btn-sm" style="background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b; border-radius: 6px; padding: 4px 12px;"><i class="fas fa-sync"></i></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${pages.isEmpty()}">
                <td colspan="5" class="text-center text-muted" style="padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 2rem; opacity: 0.3;"></i>
                    <p>Aucune page</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
