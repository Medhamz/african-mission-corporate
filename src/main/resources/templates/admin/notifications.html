<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .notification-item { padding: 16px 20px; border-left: 4px solid var(--primary-blue); background: var(--bg-card); border-radius: var(--radius-sm); margin-bottom: 12px; border: 1px solid var(--border-light); transition: all 0.3s ease; }
        .notification-item:hover { border-color: rgba(59,130,246,0.15); transform: translateX(4px); }
        .notification-item .title { color: var(--text-primary); font-weight: 600; }
        .notification-item .message { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
        .notification-item .time { font-size: 0.7rem; color: var(--text-muted); }
        .notification-item .type-info { border-left-color: var(--primary-blue); }
        .notification-item .type-success { border-left-color: #22c55e; }
        .notification-item .type-warning { border-left-color: #f59e0b; }
        .notification-item .type-error { border-left-color: #ef4444; }
        .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
        .btn-danger-sm { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: 6px; }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .btn-success-sm { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; border-radius: 6px; }
        .btn-success-sm:hover { background: rgba(34,197,94,0.2); color: #22c55e; }
        .empty-state { text-align: center; padding: 60px 0; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-bell" style="color: var(--primary-blue);"></i> Notifications <span th:if="${unreadCount > 0}" class="badge" style="background: #ef4444; color: #fff; margin-left: 8px;" th:text="${unreadCount}">0</span></h1>
        </div>
        <div>
            <form method="post" action="/admin/notifications/mark-all-read" style="display:inline;">
                <button type="submit" class="btn btn-sm btn-success-sm" th:if="${unreadCount > 0}"><i class="fas fa-check-double"></i> Tout marquer comme lu</button>
            </form>
            <form method="post" action="/admin/notifications/dismiss-all" style="display:inline;">
                <button type="submit" class="btn btn-sm btn-danger-sm" th:if="${notifications != null and !notifications.isEmpty()}"><i class="fas fa-trash"></i> Tout supprimer</button>
            </form>
        </div>
    </header>

    <div th:if="${notifications == null or notifications.isEmpty()}">
        <div class="empty-state">
            <i class="fas fa-bell-slash"></i>
            <p>Aucune notification</p>
        </div>
    </div>

    <div th:each="notif : ${notifications}" class="notification-item" th:classappend="${notif.type == 'success' ? 'type-success' : notif.type == 'warning' ? 'type-warning' : notif.type == 'error' ? 'type-error' : 'type-info'}">
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <div class="title" th:text="${notif.title}">Titre</div>
                <div class="message" th:text="${notif.message}">Message</div>
                <div class="time" th:text="${#temporals.format(notif.createdAt, 'dd/MM/yyyy HH:mm')}">Date</div>
            </div>
            <div style="display: flex; gap: 8px;">
                <form method="post" th:action="@{/admin/notifications/mark-read/{id}(id=${notif.id})}" style="display:inline;">
                    <button type="submit" class="btn-success-sm btn-sm"><i class="fas fa-check"></i></button>
                </form>
                <form method="post" th:action="@{/admin/notifications/dismiss/{id}(id=${notif.id})}" style="display:inline;">
                    <button type="submit" class="btn-danger-sm btn-sm"><i class="fas fa-times"></i></button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
