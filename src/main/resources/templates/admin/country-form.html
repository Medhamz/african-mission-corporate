<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="admin/layout :: page(~{::content})">
<head>
    <title th:text="${pageTitle}">Formulaire pays</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3" th:text="${country.id} ? 'Modifier un pays' : 'Ajouter un pays'">
            <i class="fas fa-globe"></i> Formulaire pays
        </h1>
        <a href="/admin/countries" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Retour
        </a>
    </div>

    <form th:action="@{/admin/countries/save}" method="post" th:object="${country}">
        <input type="hidden" th:field="*{id}" />
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="name" class="form-label">Nom du pays *</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                </div>
                <div class="mb-3">
                    <label for="capital" class="form-label">Capitale *</label>
                    <input type="text" class="form-control" id="capital" th:field="*{capital}" required>
                </div>
                <div class="mb-3">
                    <label for="lat" class="form-label">Latitude *</label>
                    <input type="number" step="0.0001" class="form-control" id="lat" th:field="*{lat}" required>
                </div>
                <div class="mb-3">
                    <label for="lng" class="form-label">Longitude *</label>
                    <input type="number" step="0.0001" class="form-control" id="lng" th:field="*{lng}" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="projectsCount" class="form-label">Nombre de projets</label>
                    <input type="number" class="form-control" id="projectsCount" th:field="*{projectsCount}">
                </div>
                <div class="mb-3">
                    <label for="partnersCount" class="form-label">Nombre de partenaires</label>
                    <input type="number" class="form-control" id="partnersCount" th:field="*{partnersCount}">
                </div>
                <div class="mb-3">
                    <label for="investment" class="form-label">Investissement</label>
                    <input type="text" class="form-control" id="investment" th:field="*{investment}" placeholder="ex: 1.2M FCFA">
                </div>
                <div class="mb-3">
                    <label for="type" class="form-label">Type *</label>
                    <select class="form-select" id="type" th:field="*{type}" required>
                        <option value="">-- Sélectionner --</option>
                        <option value="project">Projet</option>
                        <option value="partner">Partenaire</option>
                        <option value="investment">Investissement</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="flag" class="form-label">Drapeau (emoji)</label>
                    <input type="text" class="form-control" id="flag" th:field="*{flag}" placeholder="🇲🇱">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" th:field="*{description}" rows="2"></textarea>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="isActive" th:field="*{isActive}">
                    <label class="form-check-label" for="isActive">Actif</label>
                </div>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="/admin/countries" class="btn btn-secondary">Annuler</a>
        </div>
    </form>
</th:block>
</body>
</html>
