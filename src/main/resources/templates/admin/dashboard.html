<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #0a0a1a;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        .admin-header {
            background: #111128;
            padding: 16px 0;
            border-bottom: 1px solid rgba(74,124,255,0.1);
        }
        .admin-content {
            padding: 30px 0;
        }
        .stat-card {
            background: #111128;
            border: 1px solid rgba(74,124,255,0.1);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #4a7cff;
        }
        .stat-card .label {
            color: #8899cc;
            font-size: 0.9rem;
        }
        .btn-logout {
            color: #ff6b9d;
            border: 1px solid rgba(255,107,157,0.2);
            background: transparent;
            padding: 8px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background: rgba(255,107,157,0.1);
            color: #ff6b9d;
        }
    </style>
</head>
<body>
<header class="admin-header">
    <div class="container d-flex justify-content-between align-items-center">
        <h5 class="fw-bold m-0"><i class="fas fa-shield-alt me-2" style="color: #4a7cff;"></i>Administration</h5>
        <form method="post" action="/admin/logout">
            <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt me-2"></i>Déconnexion</button>
        </form>
    </div>
</header>

<main class="admin-content">
    <div class="container">
        <h1 class="h4 fw-bold mb-4">Tableau de bord</h1>
        <div class="row g-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="number">30</div>
                    <div class="label">Activités</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="number">4</div>
                    <div class="label">Partenaires</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="number">0</div>
                    <div class="label">Messages</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="number">1</div>
                    <div class="label">Utilisateurs</div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <div class="bg-dark bg-opacity-25 p-4 rounded-4 border border-secondary border-opacity-10">
                <h5 class="fw-bold"><i class="fas fa-code me-2" style="color: #4a7cff;"></i>Back-office en construction</h5>
                <p class="text-muted" style="color: #8899cc !important;">Cette section est en cours de développement. Prochainement : gestion des activités, partenaires et messages.</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
