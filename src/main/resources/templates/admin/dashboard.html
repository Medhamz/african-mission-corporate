<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .admin-header h1 i { color: var(--primary-blue); margin-right: 10px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 24px; transition: all 0.3s ease; text-align: center; }
        .stat-card:hover { border-color: rgba(59,130,246,0.15); transform: translateY(-4px); box-shadow: var(--shadow-sm); }
        .stat-card .stat-icon { font-size: 2rem; color: var(--primary-blue); margin-bottom: 12px; }
        .stat-card .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--text-primary); }
        .stat-card .stat-label { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
        .quick-action { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 20px; text-align: center; transition: all 0.3s ease; text-decoration: none; display: block; color: var(--text-primary); }
        .quick-action:hover { border-color: rgba(59,130,246,0.2); transform: translateY(-4px); box-shadow: var(--shadow-sm); color: var(--text-primary); }
        .quick-action .qa-icon { font-size: 1.8rem; color: var(--primary-blue); margin-bottom: 8px; }
        .quick-action .qa-label { font-weight: 500; font-size: 0.9rem; }
        .btn-logout { background: transparent; border: 1px solid rgba(239,68,68,0.2); color: #ef4444; padding: 8px 20px; border-radius: var(--radius-full); transition: all 0.3s ease; cursor: pointer; }
        .btn-logout:hover { background: rgba(239,68,68,0.05); border-color: #ef4444; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <h1><i class="fas fa-shield-alt"></i> Administration</h1>
        <div style="display: flex; align-items: center; gap: 16px;">
            <span style="color: var(--text-secondary);">Bienvenue, Admin</span>
            <form method="post" action="/admin/logout">
                <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
            </form>
        </div>
    </header>

    <!-- Statistiques -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-tasks"></i></div>
                <div class="stat-number" th:text="${activitiesCount}">0</div>
                <div class="stat-label">Activités</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-handshake"></i></div>
                <div class="stat-number" th:text="${partnersCount}">0</div>
                <div class="stat-label">Partenaires</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                <div class="stat-number" th:text="${messagesCount}">0</div>
                <div class="stat-label">Messages</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-number" th:text="${subscribersCount}">0</div>
                <div class="stat-label">Newsletter</div>
            </div>
        </div>
    </div>

    <!-- Actions rapides -->
    <div class="row g-4">
        <div class="col-12">
            <h5 style="color: var(--text-primary); font-weight: 600; margin-bottom: 16px;">
                <i class="fas fa-bolt" style="color: var(--primary-blue);"></i> Actions rapides
            </h5>
        </div>
        <div class="col-md-3"><a href="/admin/activities" class="quick-action"><div class="qa-icon"><i class="fas fa-plus-circle"></i></div><div class="qa-label">Gérer les activités</div></a></div>
        <div class="col-md-3"><a href="/admin/partners" class="quick-action"><div class="qa-icon"><i class="fas fa-user-plus"></i></div><div class="qa-label">Gérer les partenaires</div></a></div>
        <div class="col-md-3"><a href="/admin/messages" class="quick-action"><div class="qa-icon"><i class="fas fa-eye"></i></div><div class="qa-label">Voir les messages</div></a></div>
        <div class="col-md-3"><a href="/admin/chat" class="quick-action"><div class="qa-icon"><i class="fas fa-comments"></i></div><div class="qa-label">Modérer le chat <span th:if="${pendingChatCount > 0}" style="background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 8px; font-size: 0.7rem; margin-left: 4px;" th:text="${pendingChatCount}">0</span></div></a></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Afficher les toasts
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage) {
            // Utiliser showToast depuis index.html
            if (typeof showToast === 'function') {
                showToast(toastMessage, toastType);
            }
        }
    });
</script>
</body>
</html>
