<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .table { color: var(--text-secondary); }
        .table th { color: var(--text-primary); border-color: var(--border-light); }
        .table td { border-color: var(--border-light); vertical-align: middle; }
        .btn-danger-sm { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; padding: 4px 12px; font-size: 0.8rem; border-radius: 6px; }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
        .log-action { font-weight: 500; }
        .log-action.add { color: #22c55e; }
        .log-action.delete { color: #ef4444; }
        .log-action.edit { color: #f59e0b; }
        .log-action.login { color: var(--primary-blue); }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-history" style="color: var(--primary-blue);"></i> Journal d'activité</h1>
        </div>
        <form method="post" action="/admin/logs/clear" onsubmit="return confirm('Supprimer tous les logs ?')">
            <button type="submit" class="btn btn-sm" style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; border-radius: 6px; padding: 4px 12px;">
                <i class="fas fa-trash"></i> Vider
            </button>
        </form>
    </header>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Utilisateur</th>
                <th>Action</th>
                <th>Détails</th>
                <th>IP</th>
                <th>Date</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${logs}">
                <td th:text="${log.id}">1</td>
                <td th:text="${log.username}" style="color: var(--primary-blue); font-weight: 500;">admin</td>
                <td><span class="log-action" th:classappend="${log.action.startsWith('ADD') ? 'add' : log.action.startsWith('DELETE') ? 'delete' : log.action.startsWith('LOGIN') ? 'login' : 'edit'}" th:text="${log.action}">ACTION</span></td>
                <td th:text="${log.details}">Détails</td>
                <td th:text="${log.ipAddress}">IP</td>
                <td th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy HH:mm:ss')}">Date</td>
            </tr>
            <tr th:if="${logs.isEmpty()}">
                <td colspan="6" class="text-center text-muted" style="padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 2rem; opacity: 0.3;"></i>
                    <p>Aucun log</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toastMessage = /*[[${toastMessage}]]*/ null;
        const toastType = /*[[${toastType}]]*/ 'success';
        if (toastMessage && typeof showToast === 'function') {
            showToast(toastMessage, toastType);
        }
    });
</script>
</body>
</html>
