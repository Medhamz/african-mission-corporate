<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: var(--bg-primary); padding-top: 20px; font-family: 'Inter', sans-serif; }
        .admin-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-light); margin-bottom: 30px; }
        .admin-header h1 { color: var(--text-primary); font-weight: 700; font-size: 1.5rem; }
        .btn-back { color: var(--text-secondary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { color: var(--primary-blue); }
        .table { color: var(--text-secondary); }
        .table th { color: var(--text-primary); border-color: var(--border-light); }
        .table td { border-color: var(--border-light); vertical-align: middle; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 24px; text-align: center; }
        .stat-card .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--text-primary); }
        .stat-card .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <header class="admin-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <a href="/admin/dashboard" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-envelope" style="color: var(--primary-blue);"></i> Newsletter</h1>
        </div>
    </header>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${subscribers.size()}">0</div>
                <div class="stat-label">Abonnés</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${subscribers.size()}">0</div>
                <div class="stat-label">Actifs</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Campagnes envoyées</div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr>
                <th>#</th>
                <th>Email</th>
                <th>Date d'inscription</th>
                <th>Statut</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sub : ${subscribers}">
                <td th:text="${sub.id}">1</td>
                <td th:text="${sub.email}" style="color: var(--primary-blue);">email@example.com</td>
                <td th:text="${#temporals.format(sub.subscribedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                <td><span class="badge-approved" style="background: #22c55e; color: #fff; padding: 2px 12px; border-radius: 50px; font-size: 0.7rem;">Actif</span></td>
            </tr>
            <tr th:if="${subscribers.isEmpty()}">
                <td colspan="4" class="text-center text-muted" style="padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 2rem; opacity: 0.3;"></i>
                    <p>Aucun abonné pour le moment</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
