<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Administration</title>
    <meta http-equiv="refresh" content="0; url=/admin/chat-sessions">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .redirect-container {
            text-align: center;
            padding: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            max-width: 400px;
        }
        .redirect-container i {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 16px;
        }
        .redirect-container h2 {
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 8px;
        }
        .redirect-container p {
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .redirect-container .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--border-light);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .redirect-container a {
            color: var(--primary-blue);
            text-decoration: none;
        }
        .redirect-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="redirect-container">
    <i class="fas fa-comments"></i>
    <h2>Redirection vers le chat</h2>
    <p>La nouvelle interface de chat est en cours de chargement...</p>
    <div class="spinner"></div>
    <p style="margin-top: 16px; font-size: 0.85rem;">
        <i class="fas fa-arrow-right"></i>
        <a href="/admin/chat-sessions">Cliquez ici si la redirection ne fonctionne pas</a>
    </p>
</div>
</body>
</html>
