<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Indicateurs éco')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Éco-responsabilité', 'Indicateurs')"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Indicateurs</h4>
                <a th:href="@{/admin/eco/indicators/add}" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter</a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>Code</th>
                                <th>Nom</th>
                                <th>Valeur actuelle</th>
                                <th>Objectif</th>
                                <th>Unité</th>
                                <th>Tendance</th>
                                <th>Actif</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="i : ${indicators}">
                                <td th:text="${i.code}"></td>
                                <td th:text="${i.name}"></td>
                                <td th:text="${i.currentValue}"></td>
                                <td th:text="${i.targetValue}"></td>
                                <td th:text="${i.unit}"></td>
                                <td th:text="${i.trend} + '%'"></td>
                                <td>
                                        <span class="badge" th:class="${i.isActive} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${i.isActive} ? 'Actif' : 'Inactif'"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/eco/indicators/edit/{id}(id=${i.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                    <a th:href="@{/admin/eco/indicators/delete/{id}(id=${i.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')"><i class="fas fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${indicators.isEmpty()}">
                                <td colspan="8" class="text-center text-muted">Aucun indicateur.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <a th:href="@{/admin/eco/goals}" class="btn btn-outline-primary">Voir les objectifs RSE</a>
                <a th:href="@{/admin/eco/tips}" class="btn btn-outline-secondary">Voir les conseils</a>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
