<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Objectifs RSE')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Éco-responsabilité', 'Objectifs RSE')"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Objectifs RSE</h4>
                <a th:href="@{/admin/eco/goals/add}" class="btn btn-primary"><i class="fas fa-plus"></i> Ajouter</a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>Code</th>
                                <th>Nom</th>
                                <th>Progression (%)</th>
                                <th>Couleur</th>
                                <th>Actif</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="g : ${goals}">
                                <td th:text="${g.code}"></td>
                                <td th:text="${g.name}"></td>
                                <td>
                                    <div class="progress" style="height:20px;width:120px;">
                                        <div class="progress-bar" th:style="'width:' + ${g.progress} + '%'"
                                             th:attr="aria-valuenow=${g.progress}" aria-valuemin="0" aria-valuemax="100"
                                             th:text="${g.progress} + '%'"></div>
                                    </div>
                                </td>
                                <td><span class="badge" th:style="'background:' + ${g.color} + ';color:#fff;'" th:text="${g.color}"></span></td>
                                <td>
                                        <span class="badge" th:class="${g.isActive} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${g.isActive} ? 'Actif' : 'Inactif'"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/eco/goals/edit/{id}(id=${g.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                    <a th:href="@{/admin/eco/goals/delete/{id}(id=${g.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')"><i class="fas fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${goals.isEmpty()}">
                                <td colspan="6" class="text-center text-muted">Aucun objectif.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
