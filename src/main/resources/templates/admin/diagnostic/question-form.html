<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Formulaire question')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Diagnostiqueur', 'Formulaire question')"></div>

        <div class="container-fluid mt-4">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/diagnostic/questions/save}" th:object="${question}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Question</label>
                            <input type="text" class="form-control" th:field="*{question}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Catégorie</label>
                            <input type="text" class="form-control" th:field="*{category}" placeholder="ex: btp, agriculture...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ordre d'affichage</label>
                            <input type="number" class="form-control" th:field="*{stepOrder}" min="1" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{isActive}">
                            <label class="form-check-label">Actif</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                        <a th:href="@{/admin/diagnostic}" class="btn btn-secondary">Annuler</a>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
