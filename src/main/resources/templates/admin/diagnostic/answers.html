<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Gestion des réponses')"></head>
<body>
<div class="wrapper">
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Diagnostiqueur', 'Réponses pour : ' + ${question.question})"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Réponses</h4>
                <a th:href="@{/admin/diagnostic/answers/save(questionId=${question.id})}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Ajouter une réponse
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <form th:action="@{/admin/diagnostic/answers/save}" method="post">
                        <input type="hidden" name="questionId" th:value="${question.id}">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <input type="text" name="answer" class="form-control" placeholder="Réponse" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" name="value" class="form-control" placeholder="Valeur (ex: btp)" required>
                            </div>
                            <div class="col-md-2">
                                <input type="number" name="displayOrder" class="form-control" placeholder="Ordre" value="0">
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Ajouter</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Réponse</th>
                                <th>Valeur</th>
                                <th>Ordre</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="a : ${answers}">
                                <td th:text="${a.id}"></td>
                                <td th:text="${a.answer}"></td>
                                <td th:text="${a.value}"></td>
                                <td th:text="${a.displayOrder}"></td>
                                <td>
                                    <a th:href="@{/admin/diagnostic/answers/delete/{id}(id=${a.id}, questionId=${question.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${answers.isEmpty()}">
                                <td colspan="5" class="text-center text-muted">Aucune réponse.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <a th:href="@{/admin/diagnostic}" class="btn btn-secondary mt-3">Retour</a>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
