<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/admin/header :: head('Gestion du Diagnostiqueur')"></head>
<body>
<div class="wrapper">
    <!-- Sidebar -->
    <div th:replace="fragments/admin/sidebar :: sidebar"></div>

    <!-- Content -->
    <div class="main-content">
        <div th:replace="fragments/admin/header :: header('Diagnostiqueur', 'Gestion des questions et réponses')"></div>

        <div class="container-fluid mt-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>Questions du diagnostiqueur</h4>
                <a th:href="@{/admin/diagnostic/questions/add}" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Ajouter une question
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Question</th>
                                <th>Catégorie</th>
                                <th>Ordre</th>
                                <th>Actif</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="q : ${questions}">
                                <td th:text="${q.id}"></td>
                                <td th:text="${q.question}"></td>
                                <td th:text="${q.category}"></td>
                                <td th:text="${q.stepOrder}"></td>
                                <td>
                                        <span class="badge" th:class="${q.isActive} ? 'bg-success' : 'bg-secondary'"
                                              th:text="${q.isActive} ? 'Actif' : 'Inactif'"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/diagnostic/questions/{id}/answers(id=${q.id})}" class="btn btn-sm btn-info" title="Voir les réponses">
                                        <i class="fas fa-list"></i>
                                    </a>
                                    <a th:href="@{/admin/diagnostic/questions/edit/{id}(id=${q.id})}" class="btn btn-sm btn-warning" title="Modifier">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{/admin/diagnostic/questions/delete/{id}(id=${q.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Supprimer ?')" title="Supprimer">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${questions.isEmpty()}">
                                <td colspan="6" class="text-center text-muted">Aucune question.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="fragments/admin/footer :: footer"></div>
    </div>
</div>
</body>
</html>
