# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=african-mission-corporate

# =============================================
# DATABASE CONFIGURATION - UTILISE LES VARIABLES D'ENVIRONNEMENT
# =============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# =============================================
# SECURITY
# =============================================
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:Admin@2026}

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}