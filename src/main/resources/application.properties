# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=african-mission-corporate

# =============================================
# DATABASE CONFIGURATION
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/african_mission_db
spring.datasource.username=postgres
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# =============================================
# SECURITY
# =============================================
app.security.admin.username=admin
app.security.admin.password=Admin@2026

# =============================================
# EMAIL (pour formulaire de contact - optionnel)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=votre_email@gmail.com
spring.mail.password=votre_mot_de_passe
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true