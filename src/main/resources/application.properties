# =============================================
# APPLICATION NAME
# =============================================
spring.application.name=african-mission-corporate

# =============================================
# DATABASE CONFIGURATION - RENDER POSTGRESQL
# =============================================
spring.datasource.url=jdbc:postgresql://dpg-d9ajt3vlk1mc73et6j3g-a.frankfurt-postgres.render.com:5432/african_mission_db?sslmode=require
spring.datasource.username=african_mission_db_user
spring.datasource.password=hJFmVFbwWJGao3Y7lgaIt28hxLbcMxOJ
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# =============================================
# INITIALISATION DE LA BASE DE DONNEES
# =============================================
spring.sql.init.mode=never

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# =============================================
# STATIC RESOURCES
# =============================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# =============================================
# SECURITY
# =============================================
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:Admin@2026}

# =============================================
# SERVER
# =============================================
server.port=${PORT:8080}

# =============================================
# EMAIL CONFIGURATION
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
